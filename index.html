<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>簡易将棋盤</title>
    <style>
        :root {
            --board-color: #f3c35d;
            --cell-size: 50px;
        }
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f0f0; font-family: sans-serif; }
        
        /* 盤面の設定 */
        #board {
            display: grid;
            grid-template-columns: repeat(9, var(--cell-size));
            grid-template-rows: repeat(9, var(--cell-size));
            background-color: var(--board-color);
            border: 2px solid #333;
        }
        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            border: 0.5px solid #333;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            cursor: pointer;
            user-select: none;
        }
        .cell:hover { background-color: rgba(255, 255, 255, 0.3); }
        .selected { background-color: #ffeb3b !important; }
        
        /* 駒の向き */
        .white { transform: rotate(180deg); color: #d32f2f; }
        .black { color: #000; }
    </style>
</head>
<body>

<div id="board"></div>

<script>
    // 初期配置（簡略化のため一部のみ配置）
    const initialBoard = [
        ["香","桂","銀","金","玉","金","銀","桂","香"], // 1段目(後手)
        [null,"飛",null,null,null,null,null,"角",null],
        ["歩","歩","歩","歩","歩","歩","歩","歩","歩"],
        [null,null,null,null,null,null,null,null,null],
        [null,null,null,null,null,null,null,null,null],
        [null,null,null,null,null,null,null,null,null],
        ["歩","歩","歩","歩","歩","歩","歩","歩","歩"],
        [null,"角",null,null,null,null,null,"飛",null],
        ["香","桂","銀","金","玉","金","銀","桂","香"]  // 9段目(先手)
    ];

    const boardElement = document.getElementById('board');
    let selectedCell = null;

    // 盤面の描画
    function createBoard() {
        boardElement.innerHTML = '';
        for (let r = 0; r < 9; r++) {
            for (let c = 0; c < 9; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.row = r;
                cell.dataset.col = c;
                
                const piece = initialBoard[r][c];
                if (piece) {
                    cell.textContent = piece;
                    // 簡易的に上3段を後手、下3段を先手とする
                    cell.classList.add(r < 3 ? 'white' : 'black');
                }
                
                cell.addEventListener('click', () => handleCellClick(cell));
                boardElement.appendChild(cell);
            }
        }
    }

    // クリック処理
    function handleCellClick(cell) {
        if (selectedCell) {
            // 移動先を選択した場合
            if (selectedCell !== cell) {
                cell.textContent = selectedCell.textContent;
                cell.className = selectedCell.className; // クラス（向き）もコピー
                selectedCell.textContent = '';
                selectedCell.className = 'cell';
            }
            selectedCell.classList.remove('selected');
            selectedCell = null;
        } else {
            // 駒を選択した場合
            if (cell.textContent !== '') {
                selectedCell = cell;
                cell.classList.add('selected');
            }
        }
    }

    createBoard();
</script>

</body>
</html>
